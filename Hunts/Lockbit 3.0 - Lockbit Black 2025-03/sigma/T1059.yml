title: LockBit 3.0 Scripting and Command Execution
id: 3e7d4f52-45fd-4f1c-bf92-1a54c3b1f1a2
status: experimental
description: |
  Detects execution of scripting interpreters (PowerShell, cmd, wscript, cscript)
  invoked with command-line arguments commonly associated with LockBit 3.0
  staging, download, and defense-evasion behavior.
references:
  - https://attack.mitre.org/techniques/T1059/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\wscript.exe'
      - '\cscript.exe'
  selection_cmdline:
    CommandLine|contains:
      - '-ExecutionPolicy Bypass'
      - '-NoProfile'
      - 'Invoke-WebRequest'
      - 'vssadmin delete shadows'
      - 'taskkill /F /IM'
      - 'schtasks /create /tn'
      - 'wmic process call create'
  condition: selection_image and selection_cmdline
falsepositives:
  - IT management and endpoint agents (e.g. patch management tools, endpoint
    protection platforms, discovery/inventory agents) that legitimately spawn
    scripting interpreters with similar flags.
  - Hypervisor/virtualization management tooling that shells out to PowerShell
    or cmd for orchestration tasks.
  - Legitimate administrators using PowerShell with -NoProfile or
    -ExecutionPolicy Bypass for scripted automation.
level: high
tags:
  - attack.execution
  - attack.t1059
  - ransomware.lockbit
