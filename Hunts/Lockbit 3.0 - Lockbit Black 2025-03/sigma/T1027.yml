title: LockBit 3.0 Obfuscation and Encoded Execution
id: 6e4f97a9-c2ad-4126-9aeb-876c3a23e7bd
status: experimental
description: |
  Detects execution of interpreters and LOLBins with encoded, Base64-decoded,
  or otherwise obfuscated command-line arguments, consistent with LockBit 3.0
  payload staging and defense-evasion behavior.
references:
  - https://attack.mitre.org/techniques/T1027/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\msiexec.exe'
      - '\rundll32.exe'
      - '\regsvr32.exe'
  selection_cmdline:
    CommandLine|contains:
      - '-Enc'
      - 'FromBase64String'
      - 'Invoke-Expression'
      - 'New-Object System.Net.WebClient'
      - 'rundll32.exe javascript:"\..\mshtml,RunHTMLApplication"'
      - 'regsvr32 /s /n /u /i'
  condition: selection_image and selection_cmdline
falsepositives:
  - Legitimate administrative or deployment scripts that use Base64-encoded
    PowerShell commands for parameter safety rather than evasion.
  - Software packaging/installer chains that legitimately call cmd.exe as a
    child of PowerShell to run a batch script (e.g. `cmd.exe /c script.cmd`).
    This pattern still warrants manual review and file acquisition since it is
    also consistent with staged payload execution.
level: high
tags:
  - attack.defense_evasion
  - attack.t1027
  - ransomware.lockbit
