title: LockBit 3.0 Network Service Scanning
id: 85e1c5f4-d932-44f2-bda6-3e1a4d5c3e99
status: experimental
description: |
  Detects execution of network scanning utilities and PowerShell/cmd
  connectivity-testing commands consistent with LockBit 3.0 internal
  reconnaissance prior to lateral movement.
references:
  - https://attack.mitre.org/techniques/T1046/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\nmap.exe'
      - '\netscan.exe'
      - '\advanced_port_scanner.exe'
      - '\powershell.exe'
      - '\cmd.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'nmap -sS'
      - 'Test-NetConnection'
      - 'net view'
      - 'net use \'
  condition: selection_image and selection_cmdline
falsepositives:
  - Legitimate business applications that use cmd.exe to map network shares or
    test connectivity as part of normal application startup or licensing checks
    (e.g. contact-center/telephony software validating backend connectivity).
  - Network and systems administrators performing authorized scanning or
    connectivity troubleshooting.
level: high
tags:
  - attack.discovery
  - attack.t1046
  - ransomware.lockbit
