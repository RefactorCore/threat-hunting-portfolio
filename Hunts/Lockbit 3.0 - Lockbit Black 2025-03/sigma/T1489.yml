title: LockBit 3.0 Security and Backup Service Stopping
id: f7a3e4d2-b218-4c65-a84a-23b5f4a6b3c9
status: experimental
description: |
  Detects attempts to forcibly terminate or stop security, database, backup,
  or logging services (Windows Defender, VSS, wbengine, EventLog, SQL Server)
  that LockBit 3.0 targets to reduce visibility and recovery options before
  encryption.
references:
  - https://attack.mitre.org/techniques/T1489/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\taskkill.exe'
      - '\sc.exe'
      - '\net.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'taskkill /F /IM'
      - 'sc stop'
      - 'net stop'
      - 'WinDefend'
      - 'SecurityHealthService'
      - 'MSSQLSERVER'
      - 'VSS'
      - 'wbengine'
      - 'EventLog'
  condition: selection_image and selection_cmdline
falsepositives:
  - Infrastructure automation/orchestration tooling (e.g. hyperconverged
    infrastructure management agents) that stop and restart services such as
    VSS or SQL-related services as part of routine maintenance or snapshot
    operations — this was the dominant false-positive source observed during
    this hunt.
  - Legitimate administrators restarting the Windows Defender or Event Log
    service during troubleshooting.
level: high
tags:
  - attack.impact
  - attack.t1489
  - ransomware.lockbit
