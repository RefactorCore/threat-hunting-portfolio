title: LockBit 3.0 Security Tool Disabling
id: 2b5fd728-9125-4db0-91f6-3eb1b8f8df3f
status: experimental
description: |
  Detects command-line activity attempting to disable Windows Defender
  real-time/behavior monitoring, stop security-relevant services, or clear
  event logs, consistent with LockBit 3.0 pre-encryption defense evasion.
references:
  - https://attack.mitre.org/techniques/T1562.001/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\powershell.exe'
      - '\cmd.exe'
      - '\taskkill.exe'
      - '\wmic.exe'
      - '\sc.exe'
      - '\wevtutil.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'Set-MpPreference -DisableRealtimeMonitoring'
      - 'Set-MpPreference -DisableBehaviorMonitoring'
      - 'taskkill /F /IM'
      - 'net stop'
      - 'sc stop'
      - 'wevtutil cl'
  condition: selection_image and selection_cmdline
falsepositives:
  - Core Windows operating system maintenance and service-control activity that
    legitimately stops/starts services using sc.exe or net.exe.
  - Endpoint/patch management agents that restart services as part of normal
    update workflows.
  - IT operations scripts that clear specific, non-security event logs for
    routine log rotation.
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.001
  - ransomware.lockbit
