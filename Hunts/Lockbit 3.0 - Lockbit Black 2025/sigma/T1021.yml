title: LockBit 3.0 Remote Services Usage
id: e4c62b7a-0c24-4d92-b3c7-d7c58f4a2b3e
status: experimental
description: |
  Detects use of RDP, PsExec-style, WMI, SSH, or PowerShell remoting command
  patterns consistent with LockBit 3.0 lateral movement between hosts.
references:
  - https://attack.mitre.org/techniques/T1021/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\mstsc.exe'
      - '\cmd.exe'
      - '\powershell.exe'
      - '\wmic.exe'
      - '\ssh.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'cmdkey /generic:TERMSRV'
      - 'mstsc /v:'
      - 'net use \'
      - 'wmic /node:'
      - 'New-PSSession -ComputerName'
      - 'Invoke-Command -Session'
  condition: selection_image and selection_cmdline
falsepositives:
  - Legitimate business applications that map network drives or open remote
    sessions via cmd.exe as part of normal client-server operation
    (e.g. contact-center/telephony platforms connecting to backend servers).
  - IT administrators using RDP, PowerShell remoting, or WMI for authorized
    remote administration.
level: high
tags:
  - attack.lateral_movement
  - attack.t1021
  - ransomware.lockbit
