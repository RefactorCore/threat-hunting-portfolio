title: LockBit 3.0 System Recovery Inhibition
id: e5a7d6b9-82c4-4dfe-b3a8-6b7d5d3f2a9b
status: experimental
description: |
  Detects commands that delete shadow copies, disable boot recovery, delete
  backup catalogs, or disable System Restore, which LockBit 3.0 uses to
  prevent victims from recovering encrypted data without paying the ransom.
references:
  - https://attack.mitre.org/techniques/T1490/
author: Detection Engineering Portfolio
date: 2025-03-06
modified: 2025-03-13
logsource:
  category: process_creation
  product: windows
detection:
  selection_image:
    Image|endswith:
      - '\vssadmin.exe'
      - '\wbadmin.exe'
      - '\bcdedit.exe'
      - '\reg.exe'
      - '\wmic.exe'
  selection_cmdline:
    CommandLine|contains:
      - 'vssadmin delete shadows /all /quiet'
      - 'wbadmin delete catalog -quiet'
      - 'bcdedit /set {default} recoveryenabled No'
      - 'bcdedit /set {default} bootstatuspolicy ignoreallfailures'
      - 'wmic shadowcopy delete'
      - 'reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows NT\CurrentVersion\SystemRestore" /v DisableSR /t REG_DWORD /d 1 /f'
  condition: selection_image and selection_cmdline
falsepositives:
  - Legitimate system administrators or backup solutions performing routine
    shadow copy cleanup or storage management as part of disk space maintenance.
  - This combination of commands is a strong ransomware indicator; legitimate
    matches are uncommon and should still be verified against change records.
level: critical
tags:
  - attack.impact
  - attack.t1490
  - ransomware.lockbit
