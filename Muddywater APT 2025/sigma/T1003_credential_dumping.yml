title: OS Credential Dumping - Mimikatz and Procdump Detection
id: 5c4e8f2a-1b3d-4c5e-6f7a-8b9c0d1e2f3a
status: experimental
description: |
  Detects execution of credential dumping tools and techniques commonly used by
  advanced threat actors to extract credentials from Windows systems.
  
  This detection identifies:
  - Direct execution of known credential dumping tools (Mimikatz, Procdump, Ntdsutil)
  - Mimikatz command-line indicators (sekurlsa::logonpasswords, lsadump::sam)
  - Procdump targeting LSASS process (-ma lsass)
  - NTDS.dit and SAM hive extraction attempts
  
  Credential dumping is a critical attack step enabling lateral movement and privilege
  escalation. This technique is virtually always used by state-sponsored actors and
  sophisticated threat groups following initial compromise.
  
  Note: Security testing tools (Picus Simulator, Rapid7 Nexpose) legitimately simulate
  credential dumping for security assessments. These should be whitelisted.

references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1003/001/
  - https://attack.mitre.org/techniques/T1003/004/

author: Detection Engineering Team
date: 2025-03-25
modified: 2025-03-26

logsource:
  category: process_creation
  product: windows

detection:
  tool_execution:
    Image|endswith:
      - '\mimikatz.exe'
      - '\procdump.exe'
      - '\ntdsutil.exe'
  
  mimikatz_commands:
    CommandLine|contains:
      - 'sekurlsa::logonpasswords'
      - 'sekurlsa::ekeys'
      - 'lsadump::sam'
      - 'lsadump::secrets'
      - 'lsadump::cache'
  
  procdump_lsass:
    CommandLine|contains:
      - '-ma lsass'
      - '-ma lsass.exe'
  
  selection:
    tool_execution
  
  selection_commands:
    mimikatz_commands or procdump_lsass
  
  filter_testing:
    Image|contains:
      - 'Picus'
      - 'Qualys'
      - 'Rapid7'
      - 'Tenable'
  
  filter_system:
    User: 'SYSTEM'
    Image|contains:
      - 'C:\Windows\System32'
  
  condition: (selection or selection_commands) and not (filter_testing or filter_system)

level: critical
falsepositives:
  - Security testing tools simulating credential dumping (Picus, Qualys, Rapid7)
  - Legitimate backup utilities extracting NTDS database
  - Authorized penetration testing activities
  
tags:
  - attack.credential_access
  - attack.t1003
  - attack.t1003.001
  - attack.t1003.004
